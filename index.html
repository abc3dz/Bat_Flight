<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <title>Bat Flight</title>
    <style>
      body { margin: 0; background: black; }
      canvas { display: block; margin: auto; }
      #start-screen {
        position: fixed;
        width: 100%; height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: black;
        z-index: 999;
        color: white;
        font-family: sans-serif;
      }
      #start-btn {
        font-size: 32px;
        padding: 20px 48px;
        cursor: pointer;
        background: #4af;
        border: none;
        border-radius: 12px;
        color: white;
      }
      #progress-text {
        font-size: 48px;
      }
    </style>
  </head>
  <body>
    <div id="start-screen">
      <div id="progress-text">0%</div>
      <button id="start-btn" style="display:none;">▶ Start Game</button>
    </div>

    <script type="module">
      import init from './bat_flight.js';

      const text = document.getElementById('progress-text');
      const startBtn = document.getElementById('start-btn');

      async function loadWithProgress(url) {
        const response = await fetch(url);
        const total = parseInt(response.headers.get('content-length'), 10);
        let loaded = 0;

        const reader = response.body.getReader();
        const chunks = [];

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          loaded += value.length;
          text.textContent = Math.round((loaded / total) * 100) + '%';
        }

        return new Blob(chunks).arrayBuffer();
      }

      const wasmBytes = await loadWithProgress('./bat_flight_bg.wasm');

      text.style.display = 'none';
      startBtn.style.display = 'block';

      startBtn.addEventListener('click', async () => {
        document.getElementById('start-screen').style.display = 'none';
        await init(wasmBytes);
      });
    </script>
  </body>
</html>
